name: Nobil probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run probe
        env:
          NOBIL_API_KEY: ${{ secrets.NOBIL_API_KEY }}
        run: |
          python3 scripts/nobil_probe.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nobil-probe-output
          path: output/probe.json

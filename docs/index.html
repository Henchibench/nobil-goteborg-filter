<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nobil Göteborg — Laddstationsgranskare</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root {
      --bg: #0c0e13;
      --surface: #151820;
      --surface-raised: #1c2030;
      --surface-hover: #242a3a;
      --border: rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.12);
      --text: #e8e6e1;
      --text-muted: #8a8780;
      --text-dim: #5a5854;
      --green: #34d399;
      --green-bg: rgba(52,211,153,0.1);
      --yellow: #fbbf24;
      --yellow-bg: rgba(251,191,36,0.1);
      --red: #f87171;
      --red-bg: rgba(248,113,113,0.1);
      --accent: #818cf8;
      --accent-bg: rgba(129,140,248,0.08);
      --radius: 12px;
      --radius-sm: 8px;
      --font-display: 'Fraunces', Georgia, serif;
      --font-mono: 'DM Mono', 'SF Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
      height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo span {
      color: var(--text-muted);
      font-weight: 300;
      font-style: italic;
    }
    .header-tag {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 999px;
    }

    .filters {
      display: flex;
      gap: 6px;
    }
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-raised);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .filter-btn:hover { background: var(--surface-hover); }
    .filter-btn.active { border-color: var(--border-bright); color: var(--text); }
    .filter-btn.active[data-cls="green"] { background: var(--green-bg); border-color: var(--green); }
    .filter-btn.active[data-cls="yellow"] { background: var(--yellow-bg); border-color: var(--yellow); }
    .filter-btn.active[data-cls="red"] { background: var(--red-bg); border-color: var(--red); }
    .filter-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .map-container { position: relative; }
    #map { width: 100%; height: 100%; }
    #map .leaflet-control-layers {
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #map .leaflet-control-layers-toggle {
      background-color: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-sm);
      width: 36px; height: 36px;
    }
    #map .leaflet-control-layers label { color: var(--text); }
    #map .leaflet-control-layers-separator { border-top-color: var(--border); }
    #map .leaflet-control-zoom a {
      background: var(--surface);
      border-color: var(--border-bright);
      color: var(--text);
      font-family: var(--font-mono);
    }
    #map .leaflet-control-zoom a:hover { background: var(--surface-hover); }
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border-bright) !important;
      border-radius: var(--radius) !important;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
      font-family: var(--font-mono) !important;
      font-size: 12px !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; border: 1px solid var(--border-bright) !important; }
    .leaflet-popup-content { margin: 14px 16px !important; line-height: 1.5 !important; min-width: 220px !important; }
    .leaflet-container a.leaflet-popup-close-button { color: var(--text-muted) !important; }

    .panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .section-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-card {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      text-align: center;
    }
    .stat-card[data-cls="green"] { border-left: 3px solid var(--green); }
    .stat-card[data-cls="yellow"] { border-left: 3px solid var(--yellow); }
    .stat-card[data-cls="red"] { border-left: 3px solid var(--red); }
    .stat-num {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card[data-cls="green"] .stat-num { color: var(--green); }
    .stat-card[data-cls="yellow"] .stat-num { color: var(--yellow); }
    .stat-card[data-cls="red"] .stat-num { color: var(--red); }
    .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .meta-line { margin-top: 10px; font-size: 11px; color: var(--text-dim); line-height: 1.6; }

    .flag-bar { display: flex; align-items: center; justify-content: space-between; }
    .flag-count { font-size: 12px; color: var(--text-muted); }
    .flag-count strong { color: var(--accent); font-weight: 500; }
    .btn-clear {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
      background: none; border: 1px solid var(--border); border-radius: 999px;
      padding: 4px 10px; cursor: pointer; transition: all 0.2s;
    }
    .btn-clear:hover { color: var(--red); border-color: var(--red); background: var(--red-bg); }

    .export-row { display: flex; gap: 6px; margin-top: 10px; }
    .btn-export {
      flex: 1; font-family: var(--font-mono); font-size: 11px; color: var(--text);
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px; cursor: pointer;
      transition: all 0.2s; text-align: center;
    }
    .btn-export:hover { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
    .btn-export:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-export:disabled:hover { background: var(--surface-raised); border-color: var(--border); color: var(--text); }

    .detail-scroll {
      flex: 1; overflow-y: auto; padding: 20px;
    }
    .detail-scroll::-webkit-scrollbar { width: 4px; }
    .detail-scroll::-webkit-scrollbar-track { background: transparent; }
    .detail-scroll::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    .detail-empty {
      color: var(--text-dim); font-size: 12px; text-align: center;
      padding: 40px 20px; line-height: 1.7;
    }
    .detail-empty::before {
      content: ''; display: block; width: 40px; height: 40px;
      margin: 0 auto 16px; border: 2px dashed var(--border-bright); border-radius: 50%;
    }

    .detail-card { animation: fadeSlide 0.25s ease; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .detail-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px; font-size: 11px;
      font-weight: 500; margin-bottom: 12px;
    }
    .detail-badge.green { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
    .detail-badge.yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(251,191,36,0.25); }
    .detail-badge.red { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
    .detail-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .detail-name {
      font-family: var(--font-display); font-size: 20px; font-weight: 600;
      line-height: 1.2; margin-bottom: 4px; letter-spacing: -0.01em;
    }
    .detail-address { color: var(--text-muted); font-size: 12px; margin-bottom: 8px; line-height: 1.5; }
    .btn-streetview {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 6px 12px; margin-bottom: 16px;
      text-decoration: none; transition: all 0.2s; cursor: pointer;
    }
    .btn-streetview:hover { background: var(--surface-hover); border-color: var(--border-bright); color: var(--text); }

    .sv-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .sv-overlay.open { display: flex; }
    .sv-frame {
      position: relative; width: 90vw; height: 85vh;
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border-bright);
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }
    .sv-frame iframe { width: 100%; height: 100%; border: none; }
    .sv-close {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border-bright);
      color: var(--text); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .sv-close:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }
    .sv-newtab {
      position: absolute; top: 12px; right: 56px; z-index: 10;
      padding: 6px 12px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border-bright);
      color: var(--text-muted); font-family: var(--font-mono); font-size: 11px;
      text-decoration: none; transition: all 0.2s;
    }
    .sv-newtab:hover { background: var(--surface-hover); color: var(--text); }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .detail-field {
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 10px;
    }
    .detail-field.wide { grid-column: 1 / -1; }
    .detail-field-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 3px; }
    .detail-field-value { font-size: 12px; color: var(--text); word-break: break-word; }

    .detail-reasons { margin-bottom: 16px; }
    .detail-reasons-title { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    .reason-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 11px; color: var(--text-muted); line-height: 1.5; margin-bottom: 4px;
    }
    .reason-item::before {
      content: ''; display: block; width: 4px; height: 4px;
      border-radius: 50%; background: var(--text-dim); flex-shrink: 0; margin-top: 6px;
    }

    .flag-toggle {
      display: flex; align-items: center; gap: 10px; padding: 12px; margin-top: 4px;
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; user-select: none;
    }
    .flag-toggle:hover { border-color: var(--border-bright); background: var(--surface-hover); }
    .flag-toggle.flagged { border-color: var(--red); background: var(--red-bg); }
    .flag-checkbox {
      width: 18px; height: 18px; border-radius: 4px;
      border: 2px solid var(--border-bright); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }
    .flag-toggle.flagged .flag-checkbox { background: var(--red); border-color: var(--red); }
    .flag-checkbox-check { opacity: 0; transition: opacity 0.15s; color: #fff; font-size: 12px; line-height: 1; }
    .flag-toggle.flagged .flag-checkbox-check { opacity: 1; }
    .flag-toggle-text { font-size: 12px; color: var(--text-muted); }
    .flag-toggle.flagged .flag-toggle-text { color: var(--red); }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
      .panel { border-left: none; border-top: 1px solid var(--border); max-height: 45vh; }
      .filters { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="sv-overlay" id="sv-overlay">
    <div class="sv-frame">
      <button class="sv-close" id="sv-close">&times;</button>
      <a class="sv-newtab" id="sv-newtab" href="#" target="_blank" rel="noopener">Ny flik</a>
      <iframe id="sv-iframe" src="about:blank" allow="accelerometer; gyroscope"></iframe>
    </div>
  </div>

  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">Nobil G&ouml;teborg <span>granskare</span></div>
        <div class="header-tag">Klassning v0.3</div>
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-cls="green">
          <span class="filter-dot" style="background:var(--green)"></span>
          Publik <span id="filter-count-green">0</span>
        </button>
        <button class="filter-btn active" data-cls="yellow">
          <span class="filter-dot" style="background:var(--yellow)"></span>
          Oklar <span id="filter-count-yellow">0</span>
        </button>
        <button class="filter-btn active" data-cls="red">
          <span class="filter-dot" style="background:var(--red)"></span>
          Privat <span id="filter-count-red">0</span>
        </button>
      </div>
    </header>

    <div class="map-container">
      <div id="map"></div>
    </div>

    <aside class="panel">
      <div class="panel-section">
        <div class="section-label">Stationer</div>
        <div class="stats-grid" id="stats">
          <div class="stat-card" data-cls="green"><div class="stat-num" id="stat-green">-</div><div class="stat-label">Gr&ouml;n</div></div>
          <div class="stat-card" data-cls="yellow"><div class="stat-num" id="stat-yellow">-</div><div class="stat-label">Gul</div></div>
          <div class="stat-card" data-cls="red"><div class="stat-num" id="stat-red">-</div><div class="stat-label">R&ouml;d</div></div>
        </div>
        <div class="meta-line" id="meta">Laddar data&hellip;</div>
      </div>

      <div class="panel-section">
        <div class="section-label">Flaggade stationer</div>
        <div class="flag-bar">
          <div class="flag-count"><strong id="flagged-count">0</strong> markerade som icke-publik</div>
          <button class="btn-clear" id="btn-clear">Nollst&auml;ll</button>
        </div>
        <div class="export-row">
          <button class="btn-export" id="btn-csv" disabled>Exportera CSV</button>
          <button class="btn-export" id="btn-json" disabled>Exportera JSON</button>
        </div>
      </div>

      <div class="detail-scroll" id="detail">
        <div class="detail-empty">
          Klicka p&aring; en station<br>p&aring; kartan f&ouml;r detaljer
        </div>
      </div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    (function() {
      'use strict';

      var colors = { green: '#34d399', yellow: '#fbbf24', red: '#f87171' };
      var labels = {
        green: 'H\u00f6gst trolig publik',
        yellow: 'N\u00e5got oklar',
        red: 'Sannolikt privat'
      };
      var allFeatures = [];
      var layerGroups = { green: null, yellow: null, red: null };
      var filterState = { green: true, yellow: true, red: true };
      var flaggedStations = new Set(JSON.parse(localStorage.getItem('flaggedStations') || '[]'));
      var markerMap = {};
      var selectedStationId = null;

      /* -- Map setup -- */
      var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '\u00a9 OpenStreetMap'
      });
      var esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19,
        attribution: '\u00a9 Esri \u2014 Sources: Esri, Maxar, Earthstar Geographics'
      });

      var map = L.map('map', {
        zoomControl: true,
        layers: [esriSatellite]
      }).setView([57.7089, 11.9746], 12);

      L.control.layers(
        { 'Satellit': esriSatellite, 'Karta': osmLayer },
        null,
        { position: 'topright', collapsed: true }
      ).addTo(map);

      /* -- Helpers -- */
      function esc(str) {
        var el = document.createElement('span');
        el.textContent = String(str == null ? '' : str);
        return el.innerHTML;
      }

      function saveFlagged() {
        localStorage.setItem('flaggedStations', JSON.stringify(Array.from(flaggedStations)));
        updateFlaggedUI();
      }

      function updateFlaggedUI() {
        document.getElementById('flagged-count').textContent = flaggedStations.size;
        var hasFlags = flaggedStations.size > 0;
        document.getElementById('btn-csv').disabled = !hasFlags;
        document.getElementById('btn-json').disabled = !hasFlags;
      }

      function markerStyle(cls, flagged) {
        return {
          radius: 7,
          fillColor: colors[cls] || '#666',
          color: '#0c0e13',
          weight: 2,
          opacity: 1,
          fillOpacity: flagged ? 0.25 : 0.9
        };
      }

      function updateMarkerAppearance(stationId) {
        var entry = markerMap[stationId];
        if (!entry) return;
        var isFlagged = flaggedStations.has(stationId);
        entry.marker.setStyle(markerStyle(entry.cls, isFlagged));
      }

      /* -- Filters -- */
      function toggleFilter(cls) {
        filterState[cls] = !filterState[cls];
        var btn = document.querySelector('.filter-btn[data-cls="' + cls + '"]');
        if (filterState[cls]) {
          btn.classList.add('active');
          if (layerGroups[cls]) map.addLayer(layerGroups[cls]);
        } else {
          btn.classList.remove('active');
          if (layerGroups[cls]) map.removeLayer(layerGroups[cls]);
        }
      }

      document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          toggleFilter(this.getAttribute('data-cls'));
        });
      });

      /* -- Flag toggle -- */
      function toggleFlag(stationId) {
        if (flaggedStations.has(stationId)) {
          flaggedStations.delete(stationId);
        } else {
          flaggedStations.add(stationId);
        }
        saveFlagged();
        updateMarkerAppearance(stationId);
        if (selectedStationId === stationId) {
          var feat = allFeatures.find(function(f) { return f.properties.id === stationId; });
          if (feat) renderDetail(feat.properties, feat.geometry.coordinates);
        }
      }

      document.getElementById('btn-clear').addEventListener('click', function() {
        var ids = Array.from(flaggedStations);
        flaggedStations.clear();
        saveFlagged();
        ids.forEach(function(id) { updateMarkerAppearance(id); });
        if (selectedStationId !== null) {
          var feat = allFeatures.find(function(f) { return f.properties.id === selectedStationId; });
          if (feat) renderDetail(feat.properties, feat.geometry.coordinates);
        }
      });

      /* -- Detail panel -- */
      function renderDetail(p, coords) {
        selectedStationId = p.id;
        var isFlagged = flaggedStations.has(p.id);
        var address = [p.street, p.house_number].filter(Boolean).join(' ');
        var cityLine = [p.zipcode, p.city].filter(Boolean).join(' ');
        var lat = coords ? coords[1] : null;
        var lon = coords ? coords[0] : null;
        var connectors = (p.connector_types || []).join(', ') || '\u2013';
        var capacity = (p.charging_capacity || []).join(', ') || '\u2013';
        var energy = (p.energy_carrier || []).join(', ') || '\u2013';
        var payment = ((p.signals && p.signals.payment) || []).join(', ') || '\u2013';

        var reasons = '';
        if (p.reasons && p.reasons.length) {
          var items = p.reasons.map(function(r) {
            return '<div class="reason-item">' + esc(r) + '</div>';
          }).join('');
          reasons = '<div class="detail-reasons">' +
            '<div class="detail-reasons-title">Klassningsorsaker</div>' +
            items + '</div>';
        }

        var detailEl = document.getElementById('detail');
        /* Build detail card using escaped values for all dynamic content */
        detailEl.textContent = '';
        var card = document.createElement('div');
        card.className = 'detail-card';
        card.innerHTML =
          '<div class="detail-badge ' + esc(p.classification) + '">' +
            '<span class="detail-badge-dot"></span>' +
            esc(labels[p.classification] || p.classification) + ' \u00b7 ' + esc(p.score) + ' p' +
          '</div>' +
          '<div class="detail-name">' + esc(p.name || 'Ok\u00e4nd station') + '</div>' +
          '<div class="detail-address">' +
            (address ? esc(address) + '<br>' : '') +
            (cityLine ? esc(cityLine) : '') +
          '</div>' +
          (lat && lon ? '<div class="btn-streetview" id="btn-sv" data-lat="' + esc(lat) + '" data-lon="' + esc(lon) + '">\u25CE Street View</div>' : '') +
          '<div class="detail-grid">' +
            '<div class="detail-field">' +
              '<div class="detail-field-label">Operat\u00f6r</div>' +
              '<div class="detail-field-value">' + esc(p.operator || '\u2013') + '</div>' +
            '</div>' +
            '<div class="detail-field">' +
              '<div class="detail-field-label">\u00c4gare</div>' +
              '<div class="detail-field-value">' + esc(p.owned_by || '\u2013') + '</div>' +
            '</div>' +
            '<div class="detail-field">' +
              '<div class="detail-field-label">Laddpunkter</div>' +
              '<div class="detail-field-value">' + esc(p.number_charging_points || '\u2013') + ' totalt / ' + esc(p.available_charging_points || '\u2013') + ' lediga</div>' +
            '</div>' +
            '<div class="detail-field">' +
              '<div class="detail-field-label">Kontakttyper</div>' +
              '<div class="detail-field-value">' + esc(connectors) + '</div>' +
            '</div>' +
            '<div class="detail-field">' +
              '<div class="detail-field-label">Kapacitet</div>' +
              '<div class="detail-field-value">' + esc(capacity) + '</div>' +
            '</div>' +
            '<div class="detail-field">' +
              '<div class="detail-field-label">Energib\u00e4rare</div>' +
              '<div class="detail-field-value">' + esc(energy) + '</div>' +
            '</div>' +
            '<div class="detail-field">' +
              '<div class="detail-field-label">Tillg\u00e4nglighet</div>' +
              '<div class="detail-field-value">' + esc((p.signals && p.signals.availability) || '\u2013') + '</div>' +
            '</div>' +
            '<div class="detail-field">' +
              '<div class="detail-field-label">\u00d6ppet 24h</div>' +
              '<div class="detail-field-value">' + esc(p.open24 || (p.signals && p.signals.open24) || '\u2013') + '</div>' +
            '</div>' +
            '<div class="detail-field">' +
              '<div class="detail-field-label">Parkeringsavgift</div>' +
              '<div class="detail-field-value">' + esc(p.parking_fee || '\u2013') + '</div>' +
            '</div>' +
            '<div class="detail-field">' +
              '<div class="detail-field-label">Tidsbegr\u00e4nsning</div>' +
              '<div class="detail-field-value">' + esc(p.time_limit || '\u2013') + '</div>' +
            '</div>' +
            '<div class="detail-field wide">' +
              '<div class="detail-field-label">Betalning</div>' +
              '<div class="detail-field-value">' + esc(payment) + '</div>' +
            '</div>' +
          '</div>' +
          reasons +
          '<div class="flag-toggle' + (isFlagged ? ' flagged' : '') + '" id="flag-toggle-btn">' +
            '<div class="flag-checkbox"><span class="flag-checkbox-check">\u2713</span></div>' +
            '<div class="flag-toggle-text">' + (isFlagged ? 'Markerad som icke-publik' : 'Flagga som icke-publik') + '</div>' +
          '</div>';
        detailEl.appendChild(card);

        document.getElementById('flag-toggle-btn').addEventListener('click', function() {
          toggleFlag(p.id);
        });

        var svBtn = document.getElementById('btn-sv');
        if (svBtn) {
          svBtn.addEventListener('click', function() {
            var svLat = this.getAttribute('data-lat');
            var svLon = this.getAttribute('data-lon');
            var svUrl = 'https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=' + svLat + ',' + svLon;
            document.getElementById('sv-iframe').src = svUrl;
            document.getElementById('sv-newtab').href = svUrl;
            document.getElementById('sv-overlay').classList.add('open');
          });
        }
      }

      /* -- Street View overlay -- */
      document.getElementById('sv-close').addEventListener('click', function() {
        document.getElementById('sv-overlay').classList.remove('open');
        document.getElementById('sv-iframe').src = 'about:blank';
      });
      document.getElementById('sv-overlay').addEventListener('click', function(e) {
        if (e.target === this) {
          this.classList.remove('open');
          document.getElementById('sv-iframe').src = 'about:blank';
        }
      });

      /* -- Export -- */
      function getFlaggedFeatures() {
        return allFeatures.filter(function(f) { return flaggedStations.has(f.properties.id); });
      }

      function downloadBlob(blob, filename) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function csvEscape(v) {
        var s = String(v == null ? '' : v);
        if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
          return '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
      }

      document.getElementById('btn-csv').addEventListener('click', function() {
        var features = getFlaggedFeatures();
        if (!features.length) return;
        var headers = ['id','name','street','house_number','zipcode','city','owned_by','operator','number_charging_points','connector_types','classification','score'];
        var rows = features.map(function(f) {
          var p = f.properties;
          return headers.map(function(h) {
            var val = p[h];
            return csvEscape(Array.isArray(val) ? val.join('; ') : val);
          }).join(',');
        });
        var csv = [headers.join(',')].concat(rows).join('\n');
        downloadBlob(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }), 'flaggade-laddstationer.csv');
      });

      document.getElementById('btn-json').addEventListener('click', function() {
        var features = getFlaggedFeatures();
        if (!features.length) return;
        var data = features.map(function(f) {
          var p = f.properties;
          return {
            id: p.id,
            name: p.name,
            street: p.street,
            house_number: p.house_number,
            zipcode: p.zipcode,
            city: p.city,
            owned_by: p.owned_by,
            operator: p.operator,
            number_charging_points: p.number_charging_points,
            connector_types: p.connector_types,
            charging_capacity: p.charging_capacity,
            classification: p.classification,
            score: p.score,
            reasons: p.reasons,
            coordinates: f.geometry.coordinates
          };
        });
        downloadBlob(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }), 'flaggade-laddstationer.json');
      });

      /* -- Load data -- */
      fetch('./chargers.geojson')
        .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function(fc) {
          allFeatures = fc.features || [];
          var meta = fc.meta || {};
          var counts = meta.classification_counts || {};

          document.getElementById('stat-green').textContent = counts.green || 0;
          document.getElementById('stat-yellow').textContent = counts.yellow || 0;
          document.getElementById('stat-red').textContent = counts.red || 0;
          document.getElementById('filter-count-green').textContent = counts.green || 0;
          document.getElementById('filter-count-yellow').textContent = counts.yellow || 0;
          document.getElementById('filter-count-red').textContent = counts.red || 0;
          document.getElementById('meta').textContent =
            (meta.station_count_mapped || 0) + ' stationer \u00b7 K\u00e4lla: ' + (meta.provider || 'Nobil') + ' / API v' + (meta.apiver || '?');

          layerGroups = { green: L.layerGroup(), yellow: L.layerGroup(), red: L.layerGroup() };

          allFeatures.forEach(function(feature) {
            var p = feature.properties;
            var coords = feature.geometry.coordinates;
            var lon = coords[0], lat = coords[1];
            var cls = p.classification || 'yellow';
            var isFlagged = flaggedStations.has(p.id);

            var marker = L.circleMarker([lat, lon], markerStyle(cls, isFlagged));

            var popupEl = document.createElement('div');
            popupEl.style.minWidth = '200px';
            var nameEl = document.createElement('strong');
            nameEl.textContent = p.name || 'Ok\u00e4nd';
            popupEl.appendChild(nameEl);
            popupEl.appendChild(document.createElement('br'));
            var clsSpan = document.createElement('span');
            clsSpan.style.color = colors[cls];
            clsSpan.textContent = (labels[cls] || cls) + ' \u00b7 ' + (p.score || 0) + 'p';
            popupEl.appendChild(clsSpan);
            popupEl.appendChild(document.createElement('br'));
            popupEl.appendChild(document.createElement('br'));
            var addrText = [p.street, p.house_number].filter(Boolean).join(' ');
            if (addrText) {
              popupEl.appendChild(document.createTextNode(addrText));
              popupEl.appendChild(document.createElement('br'));
            }
            var opLine = document.createElement('span');
            opLine.textContent = 'Op: ' + (p.operator || '\u2013') + ' | \u00c4gare: ' + (p.owned_by || '\u2013');
            popupEl.appendChild(opLine);

            marker.bindPopup(popupEl);
            marker.on('click', function() { renderDetail(p, coords); });
            markerMap[p.id] = { marker: marker, cls: cls };
            layerGroups[cls].addLayer(marker);
          });

          Object.keys(layerGroups).forEach(function(k) { layerGroups[k].addTo(map); });

          var allMarkers = Object.keys(markerMap).map(function(k) { return markerMap[k].marker; });
          if (allMarkers.length) {
            var group = L.featureGroup(allMarkers);
            if (group.getBounds().isValid()) map.fitBounds(group.getBounds().pad(0.05));
          }

          updateFlaggedUI();
        })
        .catch(function(err) {
          document.getElementById('meta').textContent = 'Kunde inte l\u00e4sa kartdata: ' + err;
        });
    })();
  </script>
</body>
</html>
